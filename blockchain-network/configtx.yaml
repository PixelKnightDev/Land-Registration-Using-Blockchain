# --- FABRIC 2.X CAPABILITIES ---
Capabilities:
  Channel: &ChannelCapabilities
    V2_0: true
  Orderer: &OrdererCapabilities
    V2_0: true
  Application: &ApplicationCapabilities
    V2_0: true

Organizations:
  - &OrdererOrg
    Name: OrdererOrg
    ID: OrdererMSP
    MSPDir: crypto-config/ordererOrganizations/landregistry.com/msp
    Policies:
      Readers: {Type: Signature, Rule: "OR('OrdererMSP.member')"}
      Writers: {Type: Signature, Rule: "OR('OrdererMSP.member')"}
      Admins: {Type: Signature, Rule: "OR('OrdererMSP.member')"}

  - &Org1
    Name: Org1MSP
    ID: Org1MSP
    MSPDir: crypto-config/peerOrganizations/org1.landregistry.com/msp
    Policies:
      Readers: {Type: Signature, Rule: "OR('Org1MSP.member')"}
      Writers: {Type: Signature, Rule: "OR('Org1MSP.member')"}
      Admins: {Type: Signature, Rule: "OR('Org1MSP.member')"}
      Endorsement: {Type: Signature, Rule: "OR('Org1MSP.member')"}
    AnchorPeers:
      - Host: peer0.org1.landregistry.com
        Port: 7051

  - &Org2
    Name: Org2MSP
    ID: Org2MSP
    MSPDir: crypto-config/peerOrganizations/org2.landregistry.com/msp
    Policies:
      Readers: {Type: Signature, Rule: "OR('Org2MSP.member')"}
      Writers: {Type: Signature, Rule: "OR('Org2MSP.member')"}
      Admins: {Type: Signature, Rule: "OR('Org2MSP.member')"}
      Endorsement: {Type: Signature, Rule: "OR('Org2MSP.member')"}
    AnchorPeers:
      - Host: peer0.org2.landregistry.com
        Port: 9051

# --- RELAXED FABRIC 2.X POLICIES FOR DEV ---
Channel: &ChannelDefaults
  Policies:
    Readers: {Type: ImplicitMeta, Rule: "ANY Readers"}
    Writers: {Type: ImplicitMeta, Rule: "ANY Writers"}
    Admins: {Type: ImplicitMeta, Rule: "ANY Admins"}
  Capabilities:
    <<: *ChannelCapabilities

Application: &ApplicationDefaults
  Policies:
    Readers: {Type: ImplicitMeta, Rule: "ANY Readers"}
    Writers: {Type: ImplicitMeta, Rule: "ANY Writers"}
    Admins: {Type: ImplicitMeta, Rule: "ANY Admins"}
    LifecycleEndorsement: {Type: ImplicitMeta, Rule: "ANY Endorsement"}
    Endorsement: {Type: ImplicitMeta, Rule: "ANY Endorsement"}
  Capabilities:
    <<: *ApplicationCapabilities

Orderer: &OrdererDefaults
  OrdererType: etcdraft
  Addresses:
    - orderer0.landregistry.com:7050
    - orderer1.landregistry.com:8050
    - orderer2.landregistry.com:9050
  Policies:
    Readers: {Type: ImplicitMeta, Rule: "ANY Readers"}
    Writers: {Type: ImplicitMeta, Rule: "ANY Writers"}
    Admins: {Type: ImplicitMeta, Rule: "ANY Admins"}
    BlockValidation: {Type: ImplicitMeta, Rule: "ANY Writers"}
  Capabilities:
    <<: *OrdererCapabilities
  EtcdRaft:
    Consenters:
      - Host: orderer0.landregistry.com
        Port: 7050
        ClientTLSCert: crypto-config/ordererOrganizations/landregistry.com/orderers/orderer0.landregistry.com/tls/server.crt
        ServerTLSCert: crypto-config/ordererOrganizations/landregistry.com/orderers/orderer0.landregistry.com/tls/server.crt
      - Host: orderer1.landregistry.com
        Port: 8050
        ClientTLSCert: crypto-config/ordererOrganizations/landregistry.com/orderers/orderer1.landregistry.com/tls/server.crt
        ServerTLSCert: crypto-config/ordererOrganizations/landregistry.com/orderers/orderer1.landregistry.com/tls/server.crt
      - Host: orderer2.landregistry.com
        Port: 9050
        ClientTLSCert: crypto-config/ordererOrganizations/landregistry.com/orderers/orderer2.landregistry.com/tls/server.crt
        ServerTLSCert: crypto-config/ordererOrganizations/landregistry.com/orderers/orderer2.landregistry.com/tls/server.crt
  BatchTimeout: 2s
  BatchSize:
    MaxMessageCount: 10
    AbsoluteMaxBytes: 99 MB
    PreferredMaxBytes: 512 KB
  Organizations:
    - *OrdererOrg

# --- NETWORK PROFILES ---
Profiles:
  Genesis:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
    Consortiums:
      LandConsortium:
        Organizations:
          - *Org1
          - *Org2

  LandChannel:
    Consortium: LandConsortium
    <<: *ChannelDefaults
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *Org1
        - *Org2